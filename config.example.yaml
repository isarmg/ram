# Ram 个人内网部署示例
#
# 使用 `ram --check-config --config /etc/ram/config.yaml` 校验配置，
# 使用 `ram --config /etc/ram/config.yaml` 启动。YAML 中相对路径以配置文件目录为基准。

serve-path: ./data
bind:
  - 127.0.0.1
port: 5000

# Ram 必须配置至少一个 Basic/Digest 用户。先创建权限为 0400/0600 的认证文件，
# 每行一条规则；不要把真实密码直接写进或提交这份 YAML。
auth-file: /etc/ram/auth.rules

# 网关在同机终止私人 TLS 时保持回环监听即可。若确需监听局域网 IP，
# 必须显式设为 true；凭据保护由可信内网或前置 HTTPS 网关负责。
allow-insecure-http: false
allow-filesystem-root: false

allow-upload: true
allow-delete: true
allow-search: true
allow-archive: true
allow-symlink: false

# personal-intranet 默认资源档：适合约 5 台个人设备并发访问。
max-connections: 64
max-concurrent-requests: 32
# 同机 TLS 网关与共享账号会聚合多台设备，因此两项保持等于全局请求上限。
max-concurrent-requests-per-source: 32
max-concurrent-requests-per-user: 32
max-request-queue: 32
request-queue-timeout: 5s

max-blocking-threads: 12
max-expensive-tasks: 2
expensive-task-timeout: 5m

max-concurrent-uploads: 4
max-concurrent-uploads-per-user: 2
max-concurrent-uploads-per-source: 3
max-upload-size: 4G
upload-idle-timeout: 30s
upload-total-timeout: 15m
upload-file-mode: '0600'
upload-dir-mode: '0700'

max-search-results: 5000
max-directory-entries: 10000
max-walk-entries: 1000000
max-walk-depth: 64
max-archive-size: 4G

storage-space-check: true
storage-reserve: 5G

# 保留的 HTTP/1.1 与写事务超时。
header-read-timeout: 30s
connection-idle-timeout: 60s
connection-max-lifetime: 1h
response-write-idle-timeout: 30s
write-lock-timeout: 5s

# 私有 PUT 候选文件清理。
stale-upload-cleanup-age: 24h
stale-upload-cleanup-max-entries: 100000
stale-upload-cleanup-max-depth: 64
stale-upload-cleanup-max-deletions: 1000
stale-upload-cleanup-timeout: 5s
