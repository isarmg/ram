<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ram file manager</title>
  <link rel="icon" type="image/x-icon" href="__ASSETS_PREFIX__favicon.ico">
  <link rel="stylesheet" href="__ASSETS_PREFIX__index.css">
</head>

<body>
  <header class="head">
    <nav class="breadcrumb" aria-label="Breadcrumb"></nav>
    <div class="toolbox">
      <a href="" class="control download hidden" title="Download file" aria-label="Download file" download="">
        <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
          <path
            d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
          <path
            d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z" />
        </svg>
      </a>
      <button type="button" class="control upload-file hidden" title="Upload files" aria-label="Upload files">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
            <path
              d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z" />
          </svg>
      </button>
      <input class="visually-hidden" type="file" id="file" tabindex="-1" aria-label="Choose files to upload" name="file" multiple>
      <button type="button" class="control upload-folder hidden" title="Upload folder" aria-label="Upload folder">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M.5 3a1 1 0 0 1 1-1h4.672a1 1 0 0 1 .707.293L8.586 4H14.5a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1h-13a1 1 0 0 1-1-1V3zm1 .5V13h13V5.5H8.379L5.965 3.086A.5.5 0 0 0 5.61 3H1.5v.5z" />
            <path
              d="M8.5 7.5a.5.5 0 0 0-1 0v2.293L6.354 8.646a.5.5 0 1 0-.708.708l2 2a.5.5 0 0 0 .708 0l2-2a.5.5 0 0 0-.708-.708L8.5 9.793V7.5z" />
          </svg>
      </button>
      <input class="visually-hidden" type="file" id="folder" tabindex="-1" aria-label="Choose a folder to upload"
        name="folder" webkitdirectory directory multiple>
      <button type="button" class="control new-folder hidden" title="New folder" aria-label="Create a new folder">
        <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
          <path
            d="m.5 3 .04.87a1.99 1.99 0 0 0-.342 1.311l.637 7A2 2 0 0 0 2.826 14H9v-1H2.826a1 1 0 0 1-.995-.91l-.637-7A1 1 0 0 1 2.19 4h11.62a1 1 0 0 1 .996 1.09L14.54 8h1.005l.256-2.819A2 2 0 0 0 13.81 3H9.828a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 6.172 1H2.5a2 2 0 0 0-2 2zm5.672-1a1 1 0 0 1 .707.293L7.586 3H2.19c-.24 0-.47.042-.683.12L1.5 2.98a1 1 0 0 1 1-.98h3.672z" />
          <path
            d="M13.5 10a.5.5 0 0 1 .5.5V12h1.5a.5.5 0 1 1 0 1H14v1.5a.5.5 0 1 1-1 0V13h-1.5a.5.5 0 0 1 0-1H13v-1.5a.5.5 0 0 1 .5-.5z" />
        </svg>
      </button>
    </div>
    <form class="searchbar hidden" role="search" aria-label="Search files and folders">
      <div class="icon">
        <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16">
          <path
            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
        </svg>
      </div>
      <input id="search" aria-label="Search folders or files" title="Search folders or files" name="q" type="search" maxlength="128" autocomplete="off">
      <button class="visually-hidden" type="submit" tabindex="-1">Search</button>
    </form>
    <div class="toolbox-right">
      <button type="button" class="logout-btn hidden" title="Log out" aria-label="Log out">
        <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M10 3.5a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-2a.5.5 0 0 1 1 0v2A1.5 1.5 0 0 1 9.5 14h-8A1.5 1.5 0 0 1 0 12.5v-9A1.5 1.5 0 0 1 1.5 2h8A1.5 1.5 0 0 1 11 3.5v2a.5.5 0 0 1-1 0z"/>
          <path fill-rule="evenodd" d="M4.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H14.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708z"/>
        </svg>
        <span class="user-name"></span>
      </button>
    </div>
  </header>
  <main class="main">
    <div class="index-page hidden">
      <div class="empty-folder hidden" role="status"></div>
      <div class="listing-notice hidden" role="alert"></div>
      <table class="uploaders-table hidden">
        <caption class="visually-hidden">Uploads</caption>
        <thead>
          <tr>
            <th class="cell-name" colspan="2" scope="col">Name</th>
            <th class="cell-status" scope="col">Progress</th>
          </tr>
        </thead>
        <tbody class="uploaders-table-body"></tbody>
      </table>
      <table class="paths-table hidden">
        <caption class="visually-hidden">Files and folders</caption>
        <thead>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
    <div class="viewer-page hidden">
      <div class="viewer-status hidden" role="status" aria-live="polite" aria-atomic="true"></div>
      <pre class="text-viewer hidden" aria-label="File contents"></pre>
    </div>
  </main>
  <template id="index-data">__INDEX_DATA__</template>
  <script type="module" src="__ASSETS_PREFIX__index.js"></script>
</body>

</html>
