name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Rust, frontend, and Chromium
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: linux-x86_64-quality
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
          check-latest: false
      - name: Install frontend dependencies
        run: npm ci --ignore-scripts
      - name: Check Rust
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --all-features --locked
      - name: Check frontend modules
        run: |
          set -euo pipefail
          npm audit --audit-level=high
          npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Chromium end-to-end tests
        run: npm run test:e2e -- --project=chromium

  dependency-policy:
    name: Dependency security and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: linux-x86_64-policy
      - name: Install security tools
        run: |
          set -euo pipefail
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.20.2
      - name: Check dependency security and policy
        run: |
          set -euo pipefail
          cargo audit --deny warnings
          cargo deny --locked check
          python3 scripts/check-license-policy.py
          ./scripts/check-production-deps.sh

  metadata-ext4:
    name: Atomic metadata policy on ext4
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: linux-x86_64-metadata-ext4
      - name: Create isolated ext4 test mount
        run: |
          set -euo pipefail
          truncate --size 256M /tmp/ram-metadata-ext4.img
          sudo mkfs.ext4 -q -F /tmp/ram-metadata-ext4.img
          sudo mkdir -p /mnt/ram-metadata-ext4
          sudo mount -o loop /tmp/ram-metadata-ext4.img /mnt/ram-metadata-ext4
          sudo chown "$(id -u):$(id -g)" /mnt/ram-metadata-ext4
      - name: Test metadata policy on ext4
        run: |
          set -euo pipefail
          TMPDIR=/mnt/ram-metadata-ext4 RAM_METADATA_EXPECT_FS=ext2/ext3 \
            cargo test --all-features --test metadata --locked -- --nocapture
      - name: Unmount ext4 test filesystem
        if: always()
        run: sudo umount /mnt/ram-metadata-ext4 || true
