name: Monthly parser fuzzing

on:
  schedule:
    - cron: "23 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  FUZZ_NIGHTLY: nightly-2026-07-22

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - digest_auth_params
          - uri_path
          - range_if_range
          - destination_host_prefix
          - log_format
          - zip_entry_name
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly-2026-07-22
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: fuzz-${{ matrix.target }}
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz --version 0.13.2
      - name: Verify locked fuzz dependencies
        run: cargo +"${FUZZ_NIGHTLY}" check --manifest-path fuzz/Cargo.toml --locked
      - name: Run bounded campaign
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          seed_dir="fuzz/corpus/$target"
          corpus_dir="target/fuzz-corpus/$target"
          test -n "$(find "$seed_dir" -maxdepth 1 -type f -print -quit)"
          rm -rf "$corpus_dir"
          mkdir -p "$corpus_dir" "fuzz/artifacts/$target"
          cp -a "$seed_dir/." "$corpus_dir/"
          cargo +"${FUZZ_NIGHTLY}" fuzz run "$target" "$corpus_dir" -- \
            -max_total_time=600 \
            -max_len=65536 \
            -timeout=10 \
            -rss_limit_mb=2048 \
            -artifact_prefix="fuzz/artifacts/$target/"
      - name: Upload reproducer on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-${{ matrix.target }}-${{ github.sha }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
