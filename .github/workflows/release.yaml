name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Linux x86_64 GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: linux-x86_64-release
      - name: Validate tag and package version
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must have the form vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi
          version="$(
            cargo metadata --locked --no-deps --format-version 1 |
              python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])'
          )"
          if [[ "$tag" != "v$version" ]]; then
            echo "Tag $tag does not match Cargo package version $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build optimized binary
        run: cargo build --release --locked
      - name: Package release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          name="ram-v${VERSION}-x86_64-unknown-linux-gnu"
          stage="dist/$name"
          mkdir -p "$stage"
          install -m 0755 target/release/ram "$stage/ram"
          cp LICENSE README.md config.example.yaml "$stage/"
          (
            cd dist
            tar --sort=name --owner=0 --group=0 --numeric-owner \
              -czf "$name.tar.gz" "$name"
            sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          )
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Ram ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
