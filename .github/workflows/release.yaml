name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      crate_exists: ${{ steps.crates_version.outputs.exists }}
      crate_checksum: ${{ steps.crates_version.outputs.checksum }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          check-latest: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: linux-release-validation
      - name: Install supply-chain checks
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.20.2
      - name: Verify license policy alignment
        run: python3 scripts/check-license-policy.py
      - name: Validate tag and package version
        id: version
        run: |
          set -euo pipefail
          python3 scripts/check-release-tag.py version-sync .
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" || "$GITHUB_REF" != refs/tags/* ]]; then
            echo "Releases must run from a tag ref, got: $GITHUB_REF" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_PROTECTED:-false}" != "true" ]]; then
            echo "Release tag is not covered by an active GitHub tag ruleset" >&2
            exit 1
          fi
          tag=${GITHUB_REF_NAME}
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          version=$(cargo metadata --locked --no-deps --format-version 1 |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          if [[ "$tag" != "v$version" ]]; then
            echo "Tag $tag does not exactly match Cargo version $version" >&2
            exit 1
          fi
          if [[ "$version" == *-* ]]; then prerelease=true; else prerelease=false; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - name: Verify release commit belongs to the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [[ -z "$DEFAULT_BRANCH" ]]; then
            echo "The repository default branch is unavailable" >&2
            exit 1
          fi
          git check-ref-format --branch "$DEFAULT_BRANCH" >/dev/null
          default_ref="refs/remotes/origin/$DEFAULT_BRANCH"
          if ! git show-ref --verify --quiet "$default_ref"; then
            echo "Checkout did not fetch the default branch: $default_ref" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "$default_ref"; then
            echo "Release commit $GITHUB_SHA is not reachable from $default_ref" >&2
            exit 1
          fi
      - name: Preflight the crates.io version
        if: steps.version.outputs.prerelease == 'false'
        id: crates_version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          trap 'rm -f "$response"' EXIT
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --max-filesize 16777216 \
            --output "$response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/json' \
            --header "User-Agent: ram-fileserver-release ($GITHUB_SERVER_URL/$GITHUB_REPOSITORY)" \
            "https://crates.io/api/v1/crates/ram-fileserver/$VERSION")
          state=$(python3 scripts/check-release-state.py crates-version \
            "$status" "$response" ram-fileserver "$VERSION")
          case "$state" in
            absent)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "checksum=" >> "$GITHUB_OUTPUT"
              ;;
            existing=????????????????????????????????????????????????????????????????)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "checksum=${state#existing=}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected crates.io state: $state" >&2
              exit 1
              ;;
          esac
      - name: Verify the annotated release tag signature
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ref_response=$(mktemp)
          tag_response=$(mktemp)
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$ref_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          if [[ "$status" != 200 ]]; then
            echo "Could not read protected release tag: GitHub API returned HTTP $status" >&2
            exit 1
          fi
          tag_url=$(python3 scripts/check-release-tag.py \
            tag-url "$ref_response" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME")
          tag_object_sha=${tag_url##*/}
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$tag_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "$tag_url")
          if [[ "$status" != 200 ]]; then
            echo "Could not read annotated release tag: GitHub API returned HTTP $status" >&2
            exit 1
          fi
          python3 scripts/check-release-tag.py verify \
            "$tag_response" "$GITHUB_SHA" "$GITHUB_REF_NAME" "$tag_object_sha"
      - name: Verify source
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo clippy --all-targets --all-features --locked -- --deny warnings
          cargo clippy --all-targets --no-default-features --locked -- --deny warnings
          cargo test --all-targets --all-features --locked
          cargo test --all-targets --no-default-features --locked
          RUSTDOCFLAGS="--deny warnings" cargo doc --no-deps --all-features --locked
          npm ci --ignore-scripts
          npm audit --audit-level=high
          npm run check
          npx playwright install --with-deps chromium firefox webkit
          npm run test:e2e
          cargo audit --deny warnings
          cargo deny --locked check
          cargo package --locked
          package_files=$(mktemp)
          cargo package --locked --list | tee "$package_files"
          if grep -Eq '(^|/)(tests|node_modules)(/|$)' "$package_files"; then
            echo "Tests or node_modules were included in the crates.io source package" >&2
            exit 1
          fi
          if grep -Eiq '(^|/)(id_(rsa|dsa|ecdsa|ed25519)|[^/]*\.(key|p12|pfx|pk8)|[^/]*(private|secret|key)[^/]*\.(pem|der))$' "$package_files"; then
            echo "A potential private key was included in the crates.io source package" >&2
            exit 1
          fi
      - name: Preserve the verified crates.io source package
        env:
          EXISTING_CRATE_CHECKSUM: ${{ steps.crates_version.outputs.checksum }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          crate="target/package/ram-fileserver-${VERSION}.crate"
          test -s "$crate"
          mkdir -p verified-source
          install -m 0644 "$crate" "verified-source/$(basename "$crate")"
          actual_checksum=$(sha256sum "$crate" | awk '{ print $1 }')
          if [[ -n "$EXISTING_CRATE_CHECKSUM" ]]; then
            python3 scripts/check-release-state.py crate-checksum \
              "$EXISTING_CRATE_CHECKSUM" "$actual_checksum"
          fi
          printf '%s\n' "$actual_checksum" \
            >"verified-source/ram-fileserver-${VERSION}.crate.sha256"
      - name: Upload the verified crates.io source package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verified-source-package
          path: verified-source/*
          if-no-files-found: error
          retention-days: 7
      - name: Verify production dependency boundary
        run: ./scripts/check-production-deps.sh
      - name: Verify privileged Unix peer identity boundary
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
          sudo -E env \
            "PATH=$PATH" \
            "CARGO_HOME=$CARGO_HOME" \
            "RUSTUP_HOME=$RUSTUP_HOME" \
            cargo test --all-features --locked --test bind \
              real_unix_peer_uids_have_independent_source_buckets_and_logs -- \
              --ignored --exact --test-threads=1

  metadata:
    name: Generate SBOM and license inventory
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Install pinned inventory tools
        run: |
          cargo install --locked cargo-cyclonedx --version 0.5.9
          cargo install --locked cargo-sbom --version 0.10.0
          cargo install --locked --features cli cargo-about --version 0.9.1
      - name: Verify license policy alignment
        run: python3 scripts/check-license-policy.py
      - name: Generate inventories
        run: |
          set -euo pipefail
          mkdir -p release-metadata
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            output="ram-fileserver-${target}.cdx"
            cargo cyclonedx --all-features --format json --target "$target" \
              --license-strict --override-filename "$output"
            install -m 0644 "$output.json" "release-metadata/$output.json"
            python3 scripts/check-sbom.py verify-target --project-directory . \
              --target "$target" "release-metadata/$output.json"
          done
          cargo sbom --output-format spdx_json_2_3 > release-metadata/ram-fileserver.spdx.json
          cargo about generate --locked --fail --all-features --config about.toml \
            --output-file release-metadata/THIRD-PARTY-LICENSES.html about.hbs
          python3 scripts/check-sbom.py verify-spdx --project-directory . \
            release-metadata/ram-fileserver.spdx.json
          python3 scripts/check-license-report.py verify --project-directory . \
            release-metadata/THIRD-PARTY-LICENSES.html
      - name: Upload release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supply-chain-metadata
          path: release-metadata/*
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build ${{ matrix.target }}
    needs: [validate, metadata]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            machine: Advanced Micro Devices X86-64
            rustflags: -C target-cpu=x86-64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            machine: AArch64
            rustflags: -C target-cpu=generic
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Download verified supply-chain metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: supply-chain-metadata
          path: release-metadata
      - name: Build optimized target
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          TARGET: ${{ matrix.target }}
        run: cargo build --locked --release --target "$TARGET"
      - name: Package target
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          name="ram-v${VERSION}-${TARGET}"
          stage="dist/$name"
          mkdir -p "$stage"
          install -m 0755 "target/${TARGET}/release/ram" "$stage/ram"
          cp LICENSE-APACHE LICENSE-MIT README.md SECURITY.md CONTRIBUTING.md \
            CHANGELOG.md config.example.yaml "$stage/"
          cp -R docs "$stage/"
          cp "release-metadata/ram-fileserver-${TARGET}.cdx.json" \
            release-metadata/ram-fileserver.spdx.json \
            release-metadata/THIRD-PARTY-LICENSES.html "$stage/"
          cargo tree --locked --edges normal,build --target "$TARGET" > "$stage/DEPENDENCIES.txt"
          ./scripts/write-release-metrics.sh \
            "$TARGET" "$stage/ram" "$stage/RELEASE-METRICS.txt"
          {
            printf '### Release metrics: `%s`\n\n```text\n' "$TARGET"
            cat "$stage/RELEASE-METRICS.txt"
            printf '```\n'
          } >> "$GITHUB_STEP_SUMMARY"
          file "$stage/ram" > "$stage/RUNTIME-LINKAGE.txt"
          readelf --file-header "$stage/ram" >> "$stage/RUNTIME-LINKAGE.txt"
          readelf --notes "$stage/ram" >> "$stage/RUNTIME-LINKAGE.txt"
          readelf --program-headers "$stage/ram" >> "$stage/RUNTIME-LINKAGE.txt"
          readelf --dynamic "$stage/ram" >> "$stage/RUNTIME-LINKAGE.txt"
          readelf --version-info "$stage/ram" >> "$stage/RUNTIME-LINKAGE.txt"
          manifest="dist/$name.supply-chain.json"
          python3 scripts/check-release-manifest.py create \
            --version "$VERSION" \
            --target "$TARGET" \
            --repository "https://github.com/$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --binary "$stage/ram" \
            --cyclonedx "$stage/ram-fileserver-${TARGET}.cdx.json" \
            --spdx "$stage/ram-fileserver.spdx.json" \
            --manifest "$manifest"
          install -m 0644 "$manifest" "$stage/$(basename "$manifest")"
          source_date_epoch=$(git log -1 --pretty=%ct)
          tar --sort=name --mtime="@$source_date_epoch" --owner=0 --group=0 --numeric-owner \
            -C dist -cf - "$name" | gzip -n > "dist/$name.tar.gz"
          (cd dist && sha256sum "$name.tar.gz" > "$name.tar.gz.sha256")
      - name: Smoke-test packaged release artifact
        id: artifact_smoke
        env:
          EXPECTED_MACHINE: ${{ matrix.machine }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          name="ram-v${VERSION}-${TARGET}"
          bash scripts/smoke-release-artifact.sh \
            "dist/$name.tar.gz" \
            "$TARGET" \
            "$EXPECTED_MACHINE" \
            "$GITHUB_SHA" \
            "smoke-diagnostics/$TARGET"
      - name: Upload failed release smoke diagnostics
        if: ${{ always() && steps.artifact_smoke.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-smoke-${{ matrix.target }}
          path: smoke-diagnostics/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 14
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.supply-chain.json
          if-no-files-found: error
          retention-days: 7

  # 中文：本 job 只创建并验证私有草稿；稳定版绝不能在 crates.io checksum 闭环前公开。
  # English: This job creates and verifies only a private draft; a stable release cannot become
  # public before the crates.io checksum loop closes.
  prepare_release:
    name: Prepare verified GitHub release draft
    needs: [validate, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    outputs:
      release_id: ${{ steps.draft_release.outputs.id }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Reject a published release or clean an exact failed draft
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          published_response=$(mktemp)
          page_response=$(mktemp)
          delete_response=$(mktemp)
          trap 'rm -f "$published_response" "$page_response" "$delete_response"' EXIT
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$published_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")
          python3 scripts/check-release-state.py published \
            "$status" "$published_response" "$GITHUB_REF_NAME"

          draft_id=
          for page in {1..100}; do
            status=$(curl \
              --silent \
              --show-error \
              --connect-timeout 5 \
              --max-time 30 \
              --output "$page_response" \
              --write-out '%{http_code}' \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=100&page=$page")
            if [[ "$status" != 200 ]]; then
              echo "Could not list release drafts: GitHub API returned HTTP $status" >&2
              sed -n '1,40p' "$page_response" >&2
              exit 1
            fi
            draft_arguments=(
              "$page_response"
              "$GITHUB_REF_NAME"
              "$GITHUB_SHA"
              "$GITHUB_REPOSITORY"
              "$PRERELEASE"
              --page-number
              "$page"
            )
            if [[ -n "$draft_id" ]]; then
              draft_arguments+=(--existing-draft-id "$draft_id")
            fi
            decision=$(python3 scripts/check-release-state.py draft-page \
              "${draft_arguments[@]}")
            case "$decision" in
              done)
                break
                ;;
              next)
                if [[ "$page" == 100 ]]; then
                  echo "Release draft lookup exceeded 100 pages" >&2
                  exit 1
                fi
                ;;
              draft-next=*)
                draft_id=${decision#draft-next=}
                if [[ "$page" == 100 ]]; then
                  echo "Release draft lookup exceeded 100 full pages" >&2
                  exit 1
                fi
                ;;
              draft-done=*)
                draft_id=${decision#draft-done=}
                break
                ;;
              *)
                echo "Unexpected release draft state: $decision" >&2
                exit 1
                ;;
            esac
          done
          if [[ -z "$draft_id" ]]; then
            exit 0
          fi

          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --request DELETE \
            --output "$delete_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$draft_id")
          if [[ "$status" != 204 ]]; then
            echo "Could not clean verified failed draft $draft_id: HTTP $status" >&2
            sed -n '1,40p' "$delete_response" >&2
            exit 1
          fi
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$delete_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$draft_id")
          if [[ "$status" != 404 ]]; then
            echo "Could not prove failed draft $draft_id was deleted: HTTP $status" >&2
            exit 1
          fi
      - name: Download verified build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Download verified supply-chain metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: supply-chain-metadata
          path: dist
      - name: Verify local asset inventory and archive checksum bindings
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: python3 scripts/check-release-assets.py local dist "$VERSION"
      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/*.tar.gz"
      - name: Bind x86_64 SBOM to its release archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/ram-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
          sbom-path: dist/ram-fileserver-x86_64-unknown-linux-gnu.cdx.json
      - name: Bind aarch64 SBOM to its release archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/ram-v${{ needs.validate.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz
          sbom-path: dist/ram-fileserver-aarch64-unknown-linux-gnu.cdx.json
      - name: Attest the x86_64 binary and SBOM digest manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/ram-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
          predicate-type: https://github.com/isarmg/ram/attestations/release-manifest/v1
          predicate-path: dist/ram-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.supply-chain.json
      - name: Attest the aarch64 binary and SBOM digest manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/ram-v${{ needs.validate.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz
          predicate-type: https://github.com/isarmg/ram/attestations/release-manifest/v1
          predicate-path: dist/ram-v${{ needs.validate.outputs.version }}-aarch64-unknown-linux-gnu.supply-chain.json
      - name: Create a complete release draft and upload archives
        id: draft_release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Ram ${{ github.ref_name }}
          body: |
            <!-- ram-release-workflow:${{ github.repository }}:${{ github.ref_name }}:${{ github.sha }} -->
          draft: true
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          generate_release_notes: true
          overwrite_files: false
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/ram-fileserver-*.cdx.json
            dist/ram-fileserver.spdx.json
            dist/THIRD-PARTY-LICENSES.html
            dist/*.supply-chain.json
      - name: Verify the draft release asset inventory
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          RELEASE_ID: ${{ steps.draft_release.outputs.id }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_ID" =~ ^[0-9]+$ ]]; then
            echo "Release action returned an invalid draft id: $RELEASE_ID" >&2
            exit 1
          fi
          release_response=$(mktemp)
          assets_response=$(mktemp)
          trap 'rm -f "$release_response" "$assets_response"' EXIT
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$release_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          if [[ "$status" != 200 ]]; then
            echo "Could not read release draft: GitHub API returned HTTP $status" >&2
            sed -n '1,40p' "$release_response" >&2
            exit 1
          fi
          python3 scripts/check-release-state.py draft \
            "$release_response" "$RELEASE_ID" "$GITHUB_REF_NAME" \
            "$GITHUB_SHA" "$GITHUB_REPOSITORY" "$PRERELEASE"
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$assets_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100")
          if [[ "$status" != 200 ]]; then
            echo "Could not read release draft assets: GitHub API returned HTTP $status" >&2
            sed -n '1,40p' "$assets_response" >&2
            exit 1
          fi
          python3 scripts/check-release-assets.py verify \
            "$release_response" "$assets_response" dist \
            "$VERSION" "$RELEASE_ID" "$PRERELEASE"
  # 中文：只有验证阶段证明版本不存在才上传；cargo publish 后还必须从远端读回同一 checksum。
  # English: Upload only after validation proves absence, then read the identical checksum back
  # from the remote service after cargo publish.
  publish-crate:
    name: Publish ram-fileserver to crates.io
    if: >-
      needs.validate.outputs.prerelease == 'false' &&
      needs.validate.outputs.crate_exists != 'true'
    needs: [validate, prepare_release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment:
      name: crates-io
      url: https://crates.io/crates/ram-fileserver/${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - name: Request a short-lived crates.io credential
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Download the verified source package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: verified-source-package
          path: verified-source
      - name: Reproduce the verified source package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          crate="target/package/ram-fileserver-${VERSION}.crate"
          verified_crate="verified-source/ram-fileserver-${VERSION}.crate"
          checksum="verified-source/ram-fileserver-${VERSION}.crate.sha256"
          test -s "$verified_crate"
          test -s "$checksum"
          expected=$(<"$checksum")
          if [[ ! "$expected" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Verified source checksum has an invalid format" >&2
            exit 1
          fi
          downloaded=$(sha256sum "$verified_crate" | awk '{ print $1 }')
          if [[ "$downloaded" != "$expected" ]]; then
            echo "Downloaded verified crate hash $downloaded does not match $expected" >&2
            exit 1
          fi
          cargo package --locked --no-verify
          test -s "$crate"
          actual=$(sha256sum "$crate" | awk '{ print $1 }')
          if [[ "$actual" != "$expected" ]]; then
            echo "Repacked crate hash $actual does not match verified hash $expected" >&2
            exit 1
          fi
      - name: Publish previously verified source
        run: cargo publish --locked --no-verify --registry crates-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
      - name: Verify published crate visibility and checksum
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          checksum_file="verified-source/ram-fileserver-${VERSION}.crate.sha256"
          test -s "$checksum_file"
          expected_checksum=$(<"$checksum_file")
          response=$(mktemp)
          trap 'rm -f "$response"' EXIT

          # 中文：cargo publish 成功只证明上传请求被接受。crates.io API 可能短暂返回 404，
          # 因此只重试该“尚未可见”状态；畸形响应、其它状态或 checksum 不同都立即关闭失败。
          # English: cargo publish success proves only that the upload was accepted. The crates.io API
          # may briefly return 404, so retry only that not-yet-visible state; malformed responses,
          # every other status, and checksum mismatches fail closed immediately.
          for attempt in {1..12}; do
            status=$(curl \
              --silent \
              --show-error \
              --connect-timeout 5 \
              --max-time 15 \
              --max-filesize 16777216 \
              --output "$response" \
              --write-out '%{http_code}' \
              --header 'Accept: application/json' \
              --header "User-Agent: ram-fileserver-release ($GITHUB_SERVER_URL/$GITHUB_REPOSITORY)" \
              "https://crates.io/api/v1/crates/ram-fileserver/$VERSION")
            state=$(python3 scripts/check-release-state.py post-publish \
              "$status" "$response" ram-fileserver "$VERSION" "$expected_checksum")
            case "$state" in
              verified)
                echo "crates.io published checksum matches the verified source package"
                exit 0
                ;;
              pending)
                if [[ "$attempt" == 12 ]]; then
                  echo "Published crate was still unavailable after 12 bounded checks" >&2
                  exit 1
                fi
                sleep 5
                ;;
              *)
                echo "Unexpected post-publish crates.io state: $state" >&2
                exit 1
                ;;
            esac
          done
          echo "Post-publish crates.io verification exhausted unexpectedly" >&2
          exit 1

  # 中文：独立 finalizer 是唯一公开 Release 的位置，并重新验证草稿身份与精确附件清单。
  # English: The independent finalizer is the sole publication point and revalidates draft identity
  # plus the exact asset inventory.
  finalize_release:
    name: Publish the verified GitHub release
    if: >-
      always() &&
      needs.prepare_release.result == 'success' &&
      (needs.validate.outputs.prerelease == 'true' ||
       needs.validate.outputs.crate_exists == 'true' ||
       needs.publish-crate.result == 'success')
    needs: [validate, prepare_release, publish-crate]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Download verified build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Download verified supply-chain metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: supply-chain-metadata
          path: dist
      - name: Reverify and publish the complete release draft
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_ID" =~ ^[0-9]+$ ]]; then
            echo "Prepare job returned an invalid draft id: $RELEASE_ID" >&2
            exit 1
          fi
          python3 scripts/check-release-assets.py local dist "$VERSION"
          release_response=$(mktemp)
          assets_response=$(mktemp)
          publish_response=$(mktemp)
          trap 'rm -f "$release_response" "$assets_response" "$publish_response"' EXIT
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$release_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          if [[ "$status" != 200 ]]; then
            echo "Could not re-read release draft: GitHub API returned HTTP $status" >&2
            exit 1
          fi
          python3 scripts/check-release-state.py draft \
            "$release_response" "$RELEASE_ID" "$GITHUB_REF_NAME" \
            "$GITHUB_SHA" "$GITHUB_REPOSITORY" "$PRERELEASE"
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --output "$assets_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100")
          if [[ "$status" != 200 ]]; then
            echo "Could not re-read release draft assets: GitHub API returned HTTP $status" >&2
            exit 1
          fi
          python3 scripts/check-release-assets.py verify \
            "$release_response" "$assets_response" dist \
            "$VERSION" "$RELEASE_ID" "$PRERELEASE"
          status=$(curl \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 30 \
            --request PATCH \
            --output "$publish_response" \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Content-Type: application/json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            --data '{"draft":false}' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          if [[ "$status" != 200 ]]; then
            echo "Could not publish complete release draft: GitHub API returned HTTP $status" >&2
            sed -n '1,40p' "$publish_response" >&2
            exit 1
          fi
          python3 scripts/check-release-assets.py published \
            "$publish_response" "$RELEASE_ID" "$VERSION" \
            "$GITHUB_SHA" "$GITHUB_REPOSITORY" "$PRERELEASE"
